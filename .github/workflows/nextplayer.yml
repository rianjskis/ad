name: Build NextPlayer ARM64

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Clone NextPlayer
        run: |
          git clone https://github.com/odkrys/nextplayer.git source

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable gradlew
        run: |
          cd source
          chmod +x gradlew

      - name: Force arm64-v8a only
        run: |
          cd source

          if ! grep -q 'include "arm64-v8a"' app/build.gradle.kts; then
            cat >> app/build.gradle.kts <<'EOF'

android {
    splits {
        abi {
            isEnable = true
            reset()
            include("arm64-v8a")
            isUniversalApk = false
        }
    }
}
EOF
          fi

      - name: Build release APK
        run: |
          cd source
          ./gradlew assembleRelease

      - name: Prepare APK
        run: |
          mkdir output

          find source -name "*.apk" -exec cp {} output/ \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nextplayer-arm64
          path: output/*.apk