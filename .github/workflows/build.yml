name: Update SRS Rule

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget jq tar curl

      - name: Download sing-box (latest stable)
        run: |
          SB_TAG=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep '"tag_name"' | cut -d '"' -f 4)
          SB_VER=${SB_TAG#v}

          echo "Latest version: $SB_TAG"

          wget -qO sing-box.tar.gz \
            "https://github.com/SagerNet/sing-box/releases/download/${SB_TAG}/sing-box-${SB_VER}-linux-amd64.tar.gz"

          tar -xzf sing-box.tar.gz

          mv sing-box-${SB_VER}-linux-amd64/sing-box ./sing-box

          chmod +x ./sing-box

      # 原有广告规则
      - name: Download latest rule json
        run: |
          wget -qO AWAvenue-Ads-Rule-Singbox.json \
            "https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Singbox.json"

      - name: Convert json to srs
        run: |
          ./sing-box rule-set compile \
            --output AWAvenue-Ads-Rule-Singbox.srs \
            AWAvenue-Ads-Rule-Singbox.json

      # HTTPDNS IP 规则
      - name: Download HTTPDNS yaml
        run: |
          wget -qO HTTPDNS.Block.yaml \
            "https://raw.githubusercontent.com/VirgilClyne/GetSomeFries/main/ruleset/HTTPDNS.Block.yaml"

      - name: Generate aggregated httpdns ip json
        run: |
          # 提取 IP-CIDR / IP-CIDR6
          grep -E '^- (IP-CIDR|IP-CIDR6),' HTTPDNS.Block.yaml \
            | awk -F',' '{print $2}' \
            | sort -u > ip.txt

          # 生成聚合 sing-box json
          {
            echo '{'
            echo '  "version": 2,'
            echo '  "rules": ['
            echo '    {'
            echo '      "ip_cidr": ['

            awk '
            BEGIN { first=1 }

            {
              if (!first) {
                printf(",\n")
              }

              printf("        \"%s\"", $0)

              first=0
            }

            END {
              printf("\n")
            }
            ' ip.txt

            echo '      ]'
            echo '    }'
            echo '  ]'
            echo '}'
          } > httpdns_ip.json

          echo "Generated httpdns_ip.json:"
          cat httpdns_ip.json

      - name: Compile httpdns ip rules
        run: |
          ./sing-box rule-set compile \
            --output httpdns-ip.srs \
            httpdns_ip.json

      # 生成 cnip v4/v6 nft
      - name: Generate cnip v4/v6 nft
        run: |
          # 下载 IPv4 / IPv6
          wget -qO cnip_v4.txt \
            "https://raw.githubusercontent.com/DH-Teams/DH-Geo_AS_IP_CN/main/Geo_AS_IP_CN.txt"

          wget -qO cnip_v6.txt \
            "https://raw.githubusercontent.com/DH-Teams/DH-Geo_AS_IP_CN/main/Geo_AS_IP_CN_6.txt"

          # IPv4
          echo "set cnip_v4 {" > cnip_v4.nft
          echo "    type ipv4_addr" >> cnip_v4.nft
          echo "    flags interval" >> cnip_v4.nft
          echo "    auto-merge" >> cnip_v4.nft
          echo "    elements = {" >> cnip_v4.nft

          awk '{print "        "$0","}' cnip_v4.txt >> cnip_v4.nft

          echo "    }" >> cnip_v4.nft
          echo "}" >> cnip_v4.nft

          # IPv6
          echo "set cnip_v6 {" > cnip_v6.nft
          echo "    type ipv6_addr" >> cnip_v6.nft
          echo "    flags interval" >> cnip_v6.nft
          echo "    auto-merge" >> cnip_v6.nft
          echo "    elements = {" >> cnip_v6.nft

          awk '{print "        "$0","}' cnip_v6.txt >> cnip_v6.nft

          echo "    }" >> cnip_v6.nft
          echo "}" >> cnip_v6.nft

      # 提交更新
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            AWAvenue-Ads-Rule-Singbox.srs \
            httpdns-ip.srs \
            cnip_v4.nft \
            cnip_v6.nft

          git commit -m "Update rules $(date -u +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"

          git push

      - name: 删除工作流程运行
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ github.token }}
          retain_days: 5
          keep_minimum_runs: 5
