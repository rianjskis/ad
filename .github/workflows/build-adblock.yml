name: build-adblock-rule

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sing-box
        run: |
          curl -L https://github.com/SagerNet/sing-box/releases/latest/download/sing-box-linux-amd64 -o sing-box
          chmod +x sing-box

      - name: Run script
        run: bash script.sh

      - name: Compile rule-set
        run: |
          ./sing-box rule-set compile data/rule.json -o adblock.srs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: adblock-srs
          path: adblock.srs